# dbt 接続設定
#
# 認証情報はすべて環境変数経由で注入する（リポジトリにシークレットを残さない）。
# docker-compose.yml で WAREHOUSE_* を Airflow コンテナに渡しているので、
# Airflow の BashOperator から `dbt run` を呼ぶときに自動で解決される。
#
# ローカルから直接 dbt を叩く場合は `.env` を source してから実行すること。

jp_stats_elt:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('WAREHOUSE_HOST') }}"
      port: "{{ env_var('WAREHOUSE_PORT') | int }}"
      user: "{{ env_var('WAREHOUSE_USER') }}"
      password: "{{ env_var('WAREHOUSE_PASSWORD') }}"
      dbname: "{{ env_var('WAREHOUSE_DB') }}"
      schema: staging
      threads: 4
      keepalives_idle: 0
      sslmode: disable
